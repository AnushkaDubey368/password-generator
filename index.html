<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PassForge — Strong Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --card: #141417;
      --border: #2a2a30;
      --accent: #00e5a0;
      --accent2: #00b8ff;
      --danger: #ff4d6d;
      --warn: #ffb703;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,229,160,0.07) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .blob2 {
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,184,255,0.06) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease;
    }

    .header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .lock-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      font-family: var(--mono);
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      animation: fadeUp 0.6s ease 0.1s both;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    /* Password display */
    .password-box {
      background: #0a0a0c;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
      min-height: 64px;
    }

    .password-box:focus-within {
      border-color: var(--accent);
    }

    #password-output {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--accent);
      background: none;
      border: none;
      outline: none;
      width: 100%;
      letter-spacing: 1px;
      word-break: break-all;
      cursor: text;
    }

    #password-output::placeholder {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0;
    }

    .copy-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .copy-btn:hover { background: #00ffb3; transform: scale(1.05); }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn.copied { background: var(--accent2); color: #fff; }

    /* Strength meter */
    .strength-section { margin-bottom: 24px; }

    .strength-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #strength-text {
      font-weight: 700;
      transition: color 0.3s;
    }

    .strength-bar {
      height: 6px;
      border-radius: 6px;
      background: var(--border);
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .strength-bar .seg {
      border-radius: 6px;
      background: var(--border);
      transition: background 0.4s ease;
    }

    /* Controls */
    .controls { display: flex; flex-direction: column; gap: 20px; }

    /* Length slider */
    .length-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .control-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #length-display {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      font-weight: 700;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,229,160,0.4);
      transition: transform 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* Toggles / Checkboxes */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .option-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0a0c;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .option-item:hover { border-color: var(--accent); background: #111115; }
    .option-item.active { border-color: var(--accent); }

    .option-label {
      font-size: 0.8rem;
      color: var(--text);
      font-family: var(--mono);
      user-select: none;
    }

    .toggle {
      width: 36px; height: 20px;
      background: var(--border);
      border-radius: 20px;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.3s;
    }

    .option-item.active .toggle { background: var(--accent); }
    .option-item.active .toggle::after { transform: translateX(16px); }

    /* Buttons row */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-generate {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
    }

    .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,160,0.25); }
    .btn-generate:active { transform: translateY(0); }

    .btn-refresh {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: var(--danger);
      font-family: var(--mono);
      text-align: center;
      margin-top: 4px;
      animation: shake 0.3s ease;
    }

    .error-msg.show { display: block; }

    /* History */
    .history-section {
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .history-title {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 140px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0a0c;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .history-item:hover { border-color: var(--accent); color: var(--text); }

    .history-pw {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .history-copy {
      color: var(--muted);
      font-size: 0.7rem;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .history-item:hover .history-copy { color: var(--accent); }

    .empty-history {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 12px;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .pop-anim { animation: pop 0.25s ease; }
  </style>
</head>
<body>
  <div class="blob2"></div>

  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="lock-icon">🔐</div>
        <h1>PassForge</h1>
      </div>
      <p class="tagline">// generate · secure · never guess again</p>
    </div>

    <div class="card">
      <!-- Password Output -->
      <div class="password-box">
        <input type="text" id="password-output" readonly placeholder="Click 'Generate' to create a password..." />
        <button class="copy-btn" id="copy-btn" onclick="copyPassword()">COPY</button>
      </div>

      <!-- Strength Meter -->
      <div class="strength-section">
        <div class="strength-label">
          <span>Strength</span>
          <span id="strength-text">—</span>
        </div>
        <div class="strength-bar" id="strength-bar">
          <div class="seg" id="seg1"></div>
          <div class="seg" id="seg2"></div>
          <div class="seg" id="seg3"></div>
          <div class="seg" id="seg4"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <!-- Length -->
        <div>
          <div class="length-row">
            <span class="control-label">Password Length</span>
            <span id="length-display">16</span>
          </div>
          <input type="range" id="length-slider" min="6" max="64" value="16"
            oninput="document.getElementById('length-display').textContent = this.value" />
        </div>

        <!-- Options -->
        <div>
          <div class="control-label" style="margin-bottom: 10px;">Include Characters</div>
          <div class="options-grid">
            <div class="option-item active" id="opt-upper" onclick="toggleOption('opt-upper')">
              <span class="option-label">A–Z Uppercase</span>
              <div class="toggle"></div>
            </div>
            <div class="option-item active" id="opt-lower" onclick="toggleOption('opt-lower')">
              <span class="option-label">a–z Lowercase</span>
              <div class="toggle"></div>
            </div>
            <div class="option-item active" id="opt-numbers" onclick="toggleOption('opt-numbers')">
              <span class="option-label">0–9 Numbers</span>
              <div class="toggle"></div>
            </div>
            <div class="option-item active" id="opt-symbols" onclick="toggleOption('opt-symbols')">
              <span class="option-label">!@# Symbols</span>
              <div class="toggle"></div>
            </div>
          </div>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="error-msg">
          ⚠ Select at least one character type to generate a password.
        </div>

        <!-- Buttons -->
        <div class="btn-row">
          <button class="btn btn-generate" onclick="generatePassword()">⚡ Generate</button>
          <button class="btn btn-refresh" onclick="generatePassword()">↻ Regenerate</button>
        </div>
      </div>

      <!-- History -->
      <div class="history-section">
        <div class="history-title">Recent Passwords</div>
        <div class="history-list" id="history-list">
          <div class="empty-history">No passwords generated yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── Character Sets ───────────────────────────────
    const CHARS = {
      upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower:   'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    const history = [];

    // ─── Toggle Options ───────────────────────────────
    function toggleOption(id) {
      const el = document.getElementById(id);
      el.classList.toggle('active');
      hideError(); // hide any old error
    }

    // ─── Generate Password ────────────────────────────
    function generatePassword() {
      // 1. Collect which options are ON
      const useUpper   = document.getElementById('opt-upper').classList.contains('active');
      const useLower   = document.getElementById('opt-lower').classList.contains('active');
      const useNumbers = document.getElementById('opt-numbers').classList.contains('active');
      const useSymbols = document.getElementById('opt-symbols').classList.contains('active');

      // 2. ERROR HANDLING — at least one must be selected
      if (!useUpper && !useLower && !useNumbers && !useSymbols) {
        showError();
        return;
      }

      hideError();

      // 3. Build the character pool
      let pool = '';
      let guaranteed = ''; // ensure at least 1 from each selected type

      if (useUpper)   { pool += CHARS.upper;   guaranteed += randomFrom(CHARS.upper); }
      if (useLower)   { pool += CHARS.lower;   guaranteed += randomFrom(CHARS.lower); }
      if (useNumbers) { pool += CHARS.numbers; guaranteed += randomFrom(CHARS.numbers); }
      if (useSymbols) { pool += CHARS.symbols; guaranteed += randomFrom(CHARS.symbols); }

      // 4. Get desired length
      const length = parseInt(document.getElementById('length-slider').value);

      // 5. Fill remaining characters randomly from pool
      let password = guaranteed;
      for (let i = guaranteed.length; i < length; i++) {
        password += randomFrom(pool);
      }

      // 6. Shuffle the password (so guaranteed chars aren't always at the start)
      password = shuffle(password);

      // 7. Show password in the input field
      const output = document.getElementById('password-output');
      output.value = password;
      output.classList.add('pop-anim');
      setTimeout(() => output.classList.remove('pop-anim'), 300);

      // 8. Update strength meter
      updateStrength(password);

      // 9. Add to history
      addToHistory(password);
    }

    // ─── Helper: Pick random character from string ────
    function randomFrom(str) {
      return str[Math.floor(Math.random() * str.length)];
    }

    // ─── Helper: Shuffle a string ─────────────────────
    function shuffle(str) {
      const arr = str.split('');
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]]; // swap
      }
      return arr.join('');
    }

    // ─── Strength Checker ─────────────────────────────
    function updateStrength(password) {
      let score = 0;

      // Rule 1: Length
      if (password.length >= 8)  score++;
      if (password.length >= 14) score++;

      // Rule 2: Has uppercase
      if (/[A-Z]/.test(password)) score++;

      // Rule 3: Has number
      if (/[0-9]/.test(password)) score++;

      // Rule 4: Has symbol
      if (/[^A-Za-z0-9]/.test(password)) score++;

      // Map score (0-5) to 4 levels
      let level, label, color;
      if (score <= 1)      { level = 1; label = 'Very Weak'; color = '#ff4d6d'; }
      else if (score <= 2) { level = 2; label = 'Weak';      color = '#ff9f1c'; }
      else if (score <= 3) { level = 3; label = 'Good';      color = '#ffb703'; }
      else if (score <= 4) { level = 4; label = 'Strong';    color = '#2ec4b6'; }
      else                 { level = 4; label = 'Very Strong'; color = '#00e5a0'; }

      // Update label text & color
      const strengthText = document.getElementById('strength-text');
      strengthText.textContent = label;
      strengthText.style.color = color;

      // Update bar segments
      for (let i = 1; i <= 4; i++) {
        const seg = document.getElementById('seg' + i);
        seg.style.background = i <= level ? color : 'var(--border)';
      }
    }

    // ─── Copy to Clipboard ────────────────────────────
    function copyPassword() {
      const output = document.getElementById('password-output');
      const btn = document.getElementById('copy-btn');

      if (!output.value || output.value === '') {
        showError('⚠ Nothing to copy! Generate a password first.');
        return;
      }

      // Use clipboard API
      navigator.clipboard.writeText(output.value).then(() => {
        btn.textContent = '✓ COPIED';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'COPY';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        output.select();
        document.execCommand('copy');
        btn.textContent = '✓ COPIED';
        setTimeout(() => btn.textContent = 'COPY', 2000);
      });
    }

    // ─── History ──────────────────────────────────────
    function addToHistory(password) {
      history.unshift(password); // add to front
      if (history.length > 5) history.pop(); // keep only last 5

      const list = document.getElementById('history-list');
      list.innerHTML = '';

      history.forEach((pw, index) => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
          <span class="history-pw">${pw}</span>
          <span class="history-copy">📋 copy</span>
        `;
        item.onclick = () => {
          navigator.clipboard.writeText(pw).catch(() => {});
          item.querySelector('.history-copy').textContent = '✓ done';
          setTimeout(() => item.querySelector('.history-copy').textContent = '📋 copy', 1500);
        };
        list.appendChild(item);
      });
    }

    // ─── Error Handling ───────────────────────────────
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg || '⚠ Select at least one character type to generate a password.';
      el.classList.add('show');
      el.style.animation = 'none';
      setTimeout(() => el.style.animation = 'shake 0.3s ease', 10);
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    // ─── Auto-generate on load ────────────────────────
    window.onload = () => generatePassword();
  </script>
</body>
</html>
